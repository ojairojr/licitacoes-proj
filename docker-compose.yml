version: '3.8'

services:
  db:
    image: postgres:15
    container_name: licitacoes_db
    environment:
      POSTGRES_DB: ${DB_NAME:-licitacoes}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: licitacoes_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Sao_Paulo
      # Variáveis para n8n acessar o banco postgres (se necessário no futuro)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${DB_NAME:-licitacoes}
      - DB_POSTGRESDB_USER=${DB_USER:-postgres}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    depends_on:
      - db

  app:
    build: .
    container_name: licitacoes_app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-licitacoes}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - PNCP_API_URL=${PNCP_API_URL}
      - COMPRASGOV_API_URL=${COMPRASGOV_API_URL}
    volumes:
      - .:/app
      - ./.tmp:/app/.tmp
    depends_on:
      - db
  web:
    image: node:20
    container_name: licitacoes_web
    working_dir: /app
    volumes:
      - ./web:/app
    ports:
      - "3000:3000"
    command: npm run dev
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-licitacoes}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
  n8n_data:
